          - Redis: api_reference/adapters/redis.md
          - PostgreSQL: api_reference/adapters/postgres.md
          - SQLite: api_reference/adapters/sqlite.md
          - StarRocks: api_reference/adapters/starrocks.md
          - Kafka: api_reference/adapters/kafka.md
          - Keycloak: api_reference/adapters/keycloak.md
          - MinIO: api_reference/adapters/minio.md
          - ScyllaDB: api_reference/adapters/scylladb.md
          - Elasticsearch: api_reference/adapters/elasticsearch.md
          - Temporal: api_reference/adapters/temporal.md
          - Email: api_reference/adapters/email.md
          - Payment Gateways: api_reference/adapters/payment_gateways.md
      - Configs: api_reference/configs.md
      - Helpers:
